name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --no-dev
          uv pip install pytest pytest-cov

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --cov=skywater_seg --cov-report=term-missing

      - name: Verify package imports
        run: |
          uv run python -c "from skywater_seg import ONNXRuntimeInference, export_onnx, colorize_mask, plot_speed_comparison; print('All imports OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Lint with ruff
        run: uvx ruff check skywater_seg/ tests/ --ignore=E501,E402
