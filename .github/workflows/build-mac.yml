name: Demo (macOS)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    types: [assigned, opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-and-run:
    name: macos-15 arm64 Release
    runs-on: macos-15

    env:
      FETCHCONTENT_CACHE_VERSION: 1
      FETCHCONTENT_CACHE_DIR: ${{ github.workspace }}/build/_deps
      MODEL_PATH: ${{ github.workspace }}/skywater_segformer_b2_fp16.onnx
      IMAGE_PATH: ${{ github.workspace }}/assets/photos/DSCF8980.jpg

    steps:
      - uses: actions/checkout@v7

      - name: Restore FetchContent cache
        uses: actions/cache@v6
        id: cache-fetchcontent
        with:
          key: fetchcontent-v${{ env.FETCHCONTENT_CACHE_VERSION }}-macos-arm64-${{ hashFiles('demo/cxx/cmake/FetchOnnxRuntime.cmake') }}
          restore-keys: fetchcontent-v${{ env.FETCHCONTENT_CACHE_VERSION }}-macos-arm64-
          path: ${{ env.FETCHCONTENT_CACHE_DIR }}

      - name: Install system deps
        run: brew install cmake

      - name: Configure
        run: |
          cd demo/cxx
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DONNXRUNTIME_CUDA=OFF \
            -DFETCHCONTENT_FULLY_DISCONNECTED=${{ steps.cache-fetchcontent.outputs.cache-hit == 'true' && 'ON' || 'OFF' }}

      - name: Build
        run: |
          cd demo/cxx
          cmake --build build --config Release
          ls -la build/skywater_infer || ls -la build/Release/skywater_infer

      - name: Download model
        run: |
          python3 -m pip install --quiet --break-system-packages huggingface_hub Pillow numpy
          python3 -c "from huggingface_hub import hf_hub_download; \
            path = hf_hub_download('Realcat/skywater_seg', 'skywater_segformer_b2_fp16.onnx', local_dir='.'); \
            print(f'Model: {path}')"
          ls -la "$MODEL_PATH"

      - name: Run inference
        run: |
          test -f "$MODEL_PATH" || { echo "FATAL: model not found"; exit 1; }
          cd demo/cxx/build
          ./skywater_infer "$MODEL_PATH" "$IMAGE_PATH" ci_mask.png cpu --iters 10

      - name: Verify output
        run: |
          python3 -c "
          from PIL import Image
          import numpy as np
          img = np.array(Image.open('demo/cxx/build/ci_mask.png'))
          sky_pct = (img == [255, 140, 0]).all(axis=2).mean() * 100
          water_pct = (img == [0, 200, 255]).all(axis=2).mean() * 100
          assert sky_pct > 5, f'Sky too low: {sky_pct:.1f}%'
          assert water_pct > 5, f'Water too low: {water_pct:.1f}%'
          print(f'OK: sky={sky_pct:.1f}% water={water_pct:.1f}%')
          "
