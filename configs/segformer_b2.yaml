# ============================================================
# SegFormer MiT-B2 — Transformer-based SOTA segmentation
# ============================================================
# Hierarchical Transformer encoder + lightweight MLP decoder.
# Better boundary preservation than CNN decoders.
#
# MiT-B2: 24.7M params (lighter than ConvNeXt-T 34M!)
# Native SMP support, no custom code needed.

experiment_name: skywater-segformer-b2
output_dir: ./checkpoints
seed: 42
device: cuda

# ---- Dataset ----
data:
  image_dir: E:/datasets/ADEChallengeData2016/images
  mask_dir: E:/datasets/ADEChallengeData2016/annotations
  train_split: ./data/ade20k_person/train.txt
  val_split: ./data/ade20k_person/val.txt
  val_ratio: 0.15
  image_size: [384, 384]                           # Smaller for SegFormer speed (FLOPs -44%)
  num_classes: 4
  ignore_index: 255

  class_mapping:
    3: 1       # sky
    22: 2      # water
    27: 2      # sea
    61: 2      # river
    105: 2     # fountain
    110: 2     # swimming pool
    114: 2     # waterfall
    129: 2     # lake
    13: 3      # person

  augmentation: true
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  horizontal_flip: 0.5
  vertical_flip: 0.0
  rotation: 10.0
  scale: [0.8, 1.2]

  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# ---- Model ----
model:
  name: segformer
  encoder_name: mit_b2
  encoder_weights: imagenet
  in_channels: 3
  classes: 4

# ---- Training (RTX 3060 6GB) ----
train:
  batch_size: 24                                     # 384x384 fits larger batch
  epochs: 80
  learning_rate: 0.00006                             # Lower LR for transformer
  weight_decay: 0.0001
  optimizer: adamw
  betas: [0.9, 0.999]

  scheduler: cosine
  lr_min: 0.000001
  lr_warmup_epochs: 5

  loss: dice_ce
  ce_weight: 0.5
  dice_weight: 0.5
  class_weights: [0.3, 2.0, 2.0, 2.0]

  mixed_precision: true
  gradient_accumulation: 1
  grad_clip: 1.0
  num_workers: 0

  val_every: 1
  save_every: 1
  early_stopping_patience: 20

  log_every: 2
  tensorboard: true
  wandb: false

  resume_from: ""
