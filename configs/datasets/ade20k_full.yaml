# ============================================================
# ADE20K full 150-class dataset -> 4-class sky/water/person
# ============================================================
# Trains directly on ADEChallengeData2016 without pre-filtering.
# Class remapping handled by the dataset loader.
# 20,210 train + 2,000 val images -- small footprint config.

experiment_name: skywater-ade-256
output_dir: ./checkpoints
seed: 42
device: cuda

# ---- Dataset ----
data:
  image_dir: E:\datasets\ADEChallengeData2016\images
  mask_dir: E:\datasets\ADEChallengeData2016\annotations
  train_split: ""                                    # Auto-detects training/ subdirectory
  val_split: ""                                      # Auto-detects validation/ subdirectory
  val_ratio: 0.15
  image_size: [256, 256]                             # Minimal: fits in limited RAM
  num_classes: 4
  ignore_index: 255

  class_mapping:
    3: 1       # sky
    13: 3      # person
    22: 2      # water
    27: 2      # sea -> water
    61: 2      # river -> water
    110: 2     # swimming pool -> water
    114: 2     # waterfall -> water
    129: 2     # lake -> water

  augmentation: true
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  horizontal_flip: 0.5
  vertical_flip: 0.0
  rotation: 10.0
  scale: [0.8, 1.2]

  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# ---- Model (cost-effective: ~5M params) ----
model:
  name: deeplabv3plus
  encoder_name: timm-mobilenetv3_large_100
  encoder_weights: imagenet
  in_channels: 3
  classes: 4
  encoder_output_stride: 16
  decoder_channels: 256
  decoder_atrous_rates: [12, 24, 36]

# ---- Training (minimal memory) ----
train:
  batch_size: 4                                      # Minimal: fits in limited RAM
  epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: adamw
  betas: [0.9, 0.999]

  scheduler: cosine
  lr_min: 0.000001
  lr_warmup_epochs: 5

  loss: dice_ce
  ce_weight: 0.5
  dice_weight: 0.5
  class_weights: [0.25, 1.0, 2.0, 2.0]              # bg down, water+person up

  mixed_precision: true
  gradient_accumulation: 1
  grad_clip: 1.0
  num_workers: 0                                     # Windows shared-memory safety

  val_every: 1
  save_every: 5
  early_stopping_patience: 25

  log_every: 50
  tensorboard: false
  wandb: false

  resume_from: ""
