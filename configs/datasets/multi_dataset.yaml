# ============================================================
# Multi-Dataset Training: ADE20K + Cityscapes
# ============================================================
# Mixes ADE20K (indoor+outdoor, 11K images) with Cityscapes
# (street scenes, 3K images) for balanced sky/water/person.
#
# ADE20K:  rich sky + person, weaker water coverage
# Cityscapes: rich water + person street scenes (-> compensates)

experiment_name: skywater-multi
output_dir: ./checkpoints
seed: 42
device: cuda

# -- Multi-Dataset Sources --
datasets:
  - name: ade20k
    image_dir: E:/datasets/ADEChallengeData2016/images
    mask_dir: E:/datasets/ADEChallengeData2016/annotations
    class_mapping:
      3: 1       # sky
      22: 2      # water
      27: 2      # sea
      61: 2      # river
      105: 2     # fountain
      110: 2     # swimming pool
      114: 2     # waterfall
      129: 2     # lake
      13: 3      # person

  - name: cityscapes
    image_dir: E:/datasets/CityScapes/leftImg8bit
    mask_dir: E:/datasets/CityScapes/gtFine
    class_mapping:
      23: 1      # sky
      21: 2      # water
      11: 3      # person
      24: 3      # rider -> person
    cityscapes: true

mix_weights: [1.0, 2.0]                             # Cityscapes weighted higher for water balance

# -- Shared data settings --
data:
  image_size: [512, 512]
  num_classes: 4
  ignore_index: 255

  augmentation: true
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  horizontal_flip: 0.5
  vertical_flip: 0.0
  rotation: 10.0
  scale: [0.8, 1.2]

  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# -- Model: ConvNeXt-Tiny + DINOv3 --
model:
  name: deeplabv3plus
  encoder_name: convnext-tiny
  encoder_weights: dinov3
  in_channels: 3
  classes: 4
  encoder_output_stride: 16
  decoder_channels: 256
  decoder_atrous_rates: [12, 24, 36]

# -- Training (RTX 3060 6GB) --
train:
  batch_size: 12
  epochs: 80
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: adamw
  betas: [0.9, 0.999]

  scheduler: cosine
  lr_min: 0.000001
  lr_warmup_epochs: 5

  loss: dice_ce
  ce_weight: 0.5
  dice_weight: 0.5
  class_weights: [0.3, 2.0, 2.0, 2.0]

  mixed_precision: true
  gradient_accumulation: 1
  grad_clip: 1.0
  num_workers: 0

  val_every: 1
  save_every: 10
  early_stopping_patience: 20

  log_every: 20
  tensorboard: true
  wandb: false

  resume_from: ""
