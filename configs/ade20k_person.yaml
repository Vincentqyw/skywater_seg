# ============================================================
# Sky-Water-Person Segmentation — ADEChallengeData2016
# ============================================================
# 4 classes: 0=background, 1=sky, 2=water, 3=person
# Cost-effective model: DeepLabV3+ MobileNetV3-Large (~5M params)
# ~11K useful training images, ~900 validation

experiment_name: skywater-person-ade20k
output_dir: ./checkpoints
seed: 42
device: cuda

# ---- Dataset ----
data:
  image_dir: E:/datasets/ADEChallengeData2016/images
  mask_dir: E:/datasets/ADEChallengeData2016/annotations
  train_split: ./data/ade20k_person/train.txt
  val_split: ./data/ade20k_person/val.txt
  val_ratio: 0.15
  image_size: [512, 512]
  num_classes: 4                               # 0=bg, 1=sky, 2=water, 3=person
  ignore_index: 255

  # Map ADE20K class IDs → our class indices
  class_mapping:
    3: 1       # sky → 1
    22: 2      # water → 2
    27: 2      # sea → 2
    61: 2      # river → 2
    105: 2     # fountain → 2
    110: 2     # swimming pool → 2
    114: 2     # waterfall → 2
    129: 2     # lake → 2
    13: 3      # person → 3

  augmentation: true
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  horizontal_flip: 0.5
  vertical_flip: 0.0
  rotation: 10.0
  scale: [0.8, 1.2]

  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# ---- Model (cost-effective: ~5M params) ----
model:
  name: deeplabv3plus
  encoder_name: timm-mobilenetv3_large_100
  encoder_weights: imagenet
  in_channels: 3
  classes: 4                                    # 4-class output
  encoder_output_stride: 16
  decoder_channels: 256
  decoder_atrous_rates: [12, 24, 36]

# ---- Training ----
train:
  batch_size: 24                               # RTX 3060 6GB
  epochs: 80
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: adamw
  betas: [0.9, 0.999]

  scheduler: cosine
  lr_min: 0.000001
  lr_warmup_epochs: 5

  loss: dice_ce
  ce_weight: 0.5
  dice_weight: 0.5
  class_weights: null

  mixed_precision: true                        # AMP FP16 — 2x speedup on RTX 3060
  gradient_accumulation: 1
  grad_clip: 1.0
  num_workers: 4                               # GPU data loading
  pin_memory: false                            # MPS/CPU doesn't support

  val_every: 2
  save_every: 10
  early_stopping_patience: 20

  log_every: 20
  tensorboard: true
  wandb: false

  resume_from: ""
