# ============================================================
# Sky-Water Segmentation Training Configuration
# ============================================================

experiment_name: skywater-seg
output_dir: ./checkpoints
seed: 42
device: cuda

# ---- Dataset ----
data:
  image_dir: ./data/images         # Path to RGB images
  mask_dir: ./data/masks           # Path to mask PNGs (0=bg, 1=sky, 2=water)
  train_split: ""                  # Path to train.txt (auto-split if empty)
  val_split: ""
  val_ratio: 0.15                  # Fraction for validation (if no split file)
  image_size: [512, 512]           # [height, width]
  num_classes: 3                   # 0: background, 1: sky, 2: water
  ignore_index: 255

  # Augmentation (only applied to training set)
  augmentation: true
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  horizontal_flip: 0.5
  vertical_flip: 0.0               # Don't flip vertically — sky is on top
  rotation: 10.0                   # Max rotation in degrees
  scale: [0.8, 1.2]                # Random resize crop scale range

  # Normalization (ImageNet stats)
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

# ---- Model Architecture ----
model:
  name: deeplabv3plus                               # deeplabv3plus, unet, fpn, etc.
  encoder_name: timm-mobilenetv3_large_100           # Lightweight backbone (~5M params)
  encoder_weights: imagenet                          # Pretrained encoder weights
  in_channels: 3
  classes: 3
  encoder_output_stride: 16
  decoder_channels: 256
  decoder_atrous_rates: [12, 24, 36]

# ---- Training ----
train:
  # Optimization
  batch_size: 16
  epochs: 100
  learning_rate: 0.0001          # 1e-4 is a good starting point
  weight_decay: 0.0001
  optimizer: adamw
  momentum: 0.9                  # Only used by SGD
  betas: [0.9, 0.999]           # Adam/AdamW betas

  # LR Schedule
  scheduler: cosine              # cosine, poly, step, plateau
  lr_min: 0.000001              # Minimum LR (1e-6)
  lr_warmup_epochs: 5
  poly_power: 0.9               # For poly scheduler

  # Loss
  loss: dice_ce                  # dice_ce, ce, focal, jaccard
  ce_weight: 0.5                 # CrossEntropy weight in combined loss
  dice_weight: 0.5               # Dice weight in combined loss
  class_weights: null            # Optional per-class weights, e.g. [0.5, 2.0, 2.0]

  # Training
  mixed_precision: true          # Use AMP for faster training
  gradient_accumulation: 1       # Accumulate N batches before update
  grad_clip: 1.0                 # Max gradient norm
  num_workers: 4
  pin_memory: true

  # Validation
  val_every: 1                   # Validate every N epochs
  save_every: 10                 # Save checkpoint every N epochs
  early_stopping_patience: 20    # Stop if no improvement for N epochs

  # Logging
  log_every: 20                  # Log every N batches
  tensorboard: true
  wandb: false
  wandb_project: skywater-seg

  # Resume
  resume_from: ""               # Path to checkpoint for resuming
