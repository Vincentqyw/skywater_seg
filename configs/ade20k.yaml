# ============================================================
# Sky-Water Segmentation — ADE20K Training Config
# ============================================================
# Data extracted from ADE20K 2021 by scripts/extract_ade20k.py
# 14,679 train + 1,190 val images with pixel-level sky/water masks

experiment_name: skywater-ade20k
output_dir: ./checkpoints
seed: 42
device: cuda

data:
  image_dir: ./data/ade20k_skywater/images
  mask_dir: ./data/ade20k_skywater/masks
  train_split: ./data/ade20k_skywater/train.txt
  val_split: ./data/ade20k_skywater/val.txt
  val_ratio: 0.15
  image_size: [512, 512]
  num_classes: 3
  ignore_index: 255

  augmentation: true
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.05
  horizontal_flip: 0.5
  vertical_flip: 0.0
  rotation: 10.0
  scale: [0.8, 1.2]

  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

model:
  name: deeplabv3plus
  encoder_name: timm-mobilenetv3_large_100
  encoder_weights: imagenet
  in_channels: 3
  classes: 3
  encoder_output_stride: 16
  decoder_channels: 256
  decoder_atrous_rates: [12, 24, 36]

train:
  batch_size: 16
  epochs: 100
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: adamw
  betas: [0.9, 0.999]

  scheduler: cosine
  lr_min: 0.000001
  lr_warmup_epochs: 5

  loss: dice_ce
  ce_weight: 0.5
  dice_weight: 0.5

  mixed_precision: true
  gradient_accumulation: 1
  grad_clip: 1.0
  num_workers: 4
  pin_memory: true

  val_every: 1
  save_every: 10
  early_stopping_patience: 20

  log_every: 20
  tensorboard: true
  wandb: false

  resume_from: ""
