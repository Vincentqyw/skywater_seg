repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(skywater_seg/|tests/|train\.py|inference\.py)
      - id: ruff-format
        files: ^(skywater_seg/|tests/|train\.py|inference\.py)
  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: [--profile, black]
        files: ^(skywater_seg/|tests/|train\.py|inference\.py)
